name: On Workflow Dispatch

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Source repo'
        required: true
        type: string
      dispatch_type:
        description: 'Dispatch mechanism used'
        required: true
        type: string
      auth_method:
        description: 'Auth method used by dispatcher'
        required: true
        type: string
      run_id:
        description: 'Run ID from dispatcher'
        required: true
        type: string
      timestamp:
        description: 'ISO-8601 timestamp'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  handle-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set branch name
        id: branch
        env:
          RUN_ID: ${{ inputs.run_id }}
          AUTH_METHOD: ${{ inputs.auth_method }}
        run: |
          echo "name=log/workflow-dispatch-${AUTH_METHOD}-${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Create branch
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: git checkout -b "$BRANCH"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Make script executable
        run: chmod +x scripts/append-timestamp.sh

      - name: Run append-timestamp script
        env:
          TIMESTAMP: ${{ inputs.timestamp }}
          DISPATCH_TYPE: ${{ inputs.dispatch_type }}
          AUTH_METHOD: ${{ inputs.auth_method }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          ./scripts/append-timestamp.sh \
            "$TIMESTAMP" \
            "$DISPATCH_TYPE" \
            "$AUTH_METHOD" \
            "$RUN_ID"

      - name: Commit and push
        env:
          RUN_ID: ${{ inputs.run_id }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git add logs/activity.log
          git commit -m "log: workflow_dispatch run ${RUN_ID}"
          git push origin "$BRANCH"

      - name: Write PR body
        env:
          TIMESTAMP: ${{ inputs.timestamp }}
          AUTH_METHOD: ${{ inputs.auth_method }}
          RUN_ID: ${{ inputs.run_id }}
          TRIGGERED_BY: ${{ inputs.triggered_by }}
        run: |
          cat > /tmp/pr-body.md << EOF
          | Field | Value |
          |-------|-------|
          | Timestamp | ${TIMESTAMP} |
          | Dispatch type | workflow_dispatch |
          | Auth method | ${AUTH_METHOD} |
          | Run ID | ${RUN_ID} |
          | Triggered by | ${TRIGGERED_BY} |
          EOF

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ inputs.run_id }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          gh pr create \
            --title "[workflow_dispatch] Timestamp log — run ${RUN_ID}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"
